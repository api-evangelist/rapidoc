naftiko: 1.0.0-alpha2
info:
  label: RapiDoc API — Configuration
  description: 'RapiDoc API — Configuration. 3 operations. Lead operation: Get RapiDoc API Reference. Self-contained Naftiko
    capability covering one Rapidoc business surface.'
  tags:
  - Rapidoc
  - Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAPIDOC_API_KEY: RAPIDOC_API_KEY
capability:
  consumes:
  - type: http
    namespace: rapidoc-configuration
    baseUri: https://rapidocweb.com
    description: RapiDoc API — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: api.html
      path: /api.html
      operations:
      - name: getapireference
        method: GET
        description: Get RapiDoc API Reference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: examples.html
      path: /examples.html
      operations:
      - name: getexamples
        method: GET
        description: Get RapiDoc Examples and Demos
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: quickstart.html
      path: /quickstart.html
      operations:
      - name: getquickstart
        method: GET
        description: Get RapiDoc Quick Start Guide
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: rapidoc-configuration-rest
    port: 8080
    description: REST adapter for RapiDoc API — Configuration. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api-html
      name: api-html
      description: REST surface for api.html.
      operations:
      - method: GET
        name: getapireference
        description: Get RapiDoc API Reference
        call: rapidoc-configuration.getapireference
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/examples-html
      name: examples-html
      description: REST surface for examples.html.
      operations:
      - method: GET
        name: getexamples
        description: Get RapiDoc Examples and Demos
        call: rapidoc-configuration.getexamples
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/quickstart-html
      name: quickstart-html
      description: REST surface for quickstart.html.
      operations:
      - method: GET
        name: getquickstart
        description: Get RapiDoc Quick Start Guide
        call: rapidoc-configuration.getquickstart
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rapidoc-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for RapiDoc API — Configuration. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-rapidoc-api-reference
      description: Get RapiDoc API Reference
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rapidoc-configuration.getapireference
      outputParameters:
      - type: object
        mapping: $.
    - name: get-rapidoc-examples-and-demos
      description: Get RapiDoc Examples and Demos
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rapidoc-configuration.getexamples
      outputParameters:
      - type: object
        mapping: $.
    - name: get-rapidoc-quick-start-guide
      description: Get RapiDoc Quick Start Guide
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rapidoc-configuration.getquickstart
      outputParameters:
      - type: object
        mapping: $.
